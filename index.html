<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DK's Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0a0a0f; }
    .glass { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
    .card-hover { transition: transform 0.15s, border-color 0.15s; }
    .card-hover:hover { transform: translateY(-1px); border-color: rgba(99,102,241,0.4); }
    .progress-track { background: rgba(255,255,255,0.06); border-radius: 99px; height: 6px; }
    .progress-fill { height: 6px; border-radius: 99px; transition: width 0.8s cubic-bezier(.4,0,.2,1); }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body class="min-h-screen text-white">
<div class="max-w-xl mx-auto px-4 py-8">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-xl font-bold text-white" id="greeting">DK's Dashboard</h1>
      <p class="text-gray-500 text-sm mt-0.5" id="date-str"></p>
    </div>
    <div class="text-right">
      <p class="text-2xl font-bold text-indigo-400" id="clock">--:--</p>
      <p class="text-gray-600 text-xs">IST</p>
    </div>
  </div>

  <!-- HABITS -->
  <section class="mb-8">
    <div class="flex items-center gap-2 mb-4">
      <span class="text-emerald-400">⚡</span>
      <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Daily Habits</h2>
      <div class="ml-auto w-2 h-2 rounded-full bg-emerald-400 pulse"></div>
    </div>
    <div id="habits-bars" class="flex flex-col gap-3 mb-5">
      <div class="glass rounded-xl p-4 text-gray-500 text-sm text-center">Loading...</div>
    </div>
    <div class="glass rounded-xl p-4">
      <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-3">💧 Water — 7 Day Trend</p>
      <canvas id="waterChart" height="110"></canvas>
    </div>
  </section>

  <!-- GOALS -->
  <section class="mb-8">
    <div class="flex items-center gap-2 mb-4">
      <span class="text-indigo-400">🎯</span>
      <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Goals & Projects</h2>
    </div>
    <div id="goals-list" class="flex flex-col gap-3 mb-5">
      <div class="glass rounded-xl p-4 text-gray-500 text-sm text-center">Loading...</div>
    </div>
    <div class="glass rounded-xl p-4">
      <p class="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-3">Goals by Status</p>
      <div class="flex items-center gap-6">
        <canvas id="goalsDonut" width="110" height="110" style="max-width:110px"></canvas>
        <div id="donut-legend" class="flex flex-col gap-2"></div>
      </div>
    </div>
  </section>

  <p class="text-center text-gray-700 text-xs" id="sync-time">Syncing...</p>
</div>

<script>
const STATUS = {
  "Not started":  { bg:"rgba(75,85,99,.4)",    border:"rgba(75,85,99,.8)",    text:"#9ca3af", label:"Not Started" },
  "In progress":  { bg:"rgba(59,130,246,.15)",  border:"rgba(59,130,246,.6)",  text:"#60a5fa", label:"In Progress" },
  "Done":         { bg:"rgba(16,185,129,.15)",  border:"rgba(16,185,129,.6)",  text:"#34d399", label:"Done" },
  "Blocked":      { bg:"rgba(239,68,68,.15)",   border:"rgba(239,68,68,.6)",   text:"#f87171", label:"Blocked" },
};
const PRIORITY = { High:"#f87171", Medium:"#fbbf24", Low:"#6b7280" };
const HABITS_META = [
  { key:"Water",      icon:"💧", target:4,  unit:"L",   color:"#3b82f6" },
  { key:"Reading",    icon:"📖", target:30, unit:"min", color:"#8b5cf6" },
  { key:"Meditation", icon:"🧘", target:15, unit:"min", color:"#6366f1" },
  { key:"Walking",    icon:"🚶", target:30, unit:"min", color:"#10b981" },
  { key:"Sleep",      icon:"😴", target:8,  unit:"hrs", color:"#7c3aed" },
  { key:"Exercise",   icon:"🏃", target:1,  unit:"",    color:"#f59e0b", bool:true },
];

function updateClock() {
  const now = new Date();
  const t = now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Kolkata"});
  const d = now.toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",timeZone:"Asia/Kolkata"});
  const h = +now.toLocaleTimeString("en-IN",{hour:"numeric",hour12:false,timeZone:"Asia/Kolkata"});
  document.getElementById("clock").textContent = t;
  document.getElementById("date-str").textContent = d;
  document.getElementById("greeting").textContent =
    h<12?"Good morning, DK 🌅":h<17?"Good afternoon, DK ☀️":"Good evening, DK 🌙";
}
updateClock(); setInterval(updateClock,1000);

function prop(props, name) {
  const p = props?.[name];
  if (!p) return null;
  if (p.type==="number") return p.number ?? 0;
  if (p.type==="checkbox") return p.checkbox ?? false;
  if (p.type==="select") return p.select?.name ?? null;
  if (p.type==="title") return p.title?.map(x=>x.plain_text).join("") ?? "";
  if (p.type==="rich_text") return p.rich_text?.map(x=>x.plain_text).join("") ?? "";
  if (p.type==="date") return p.date?.start ?? null;
  return null;
}

function renderHabits(page) {
  const el = document.getElementById("habits-bars");
  el.innerHTML = "";
  const props = page?.properties ?? {};
  HABITS_META.forEach(h => {
    const val = prop(props, h.key);
    const div = document.createElement("div");
    div.className = "glass rounded-xl p-4 card-hover";
    if (h.bool) {
      const done = !!val;
      div.innerHTML = `<div class="flex items-center justify-between">
        <div class="flex items-center gap-2"><span class="text-lg">${h.icon}</span><span class="text-sm font-medium text-gray-200">${h.key}</span></div>
        <span class="px-3 py-0.5 rounded-full text-xs font-bold" style="background:${done?"rgba(16,185,129,.15)":"rgba(75,85,99,.3)"}; color:${done?"#34d399":"#9ca3af"}">${done?"✓ Done":"Not yet"}</span>
      </div>`;
    } else {
      const num = typeof val==="number"?val:0;
      const pct = Math.min((num/h.target)*100,100);
      div.innerHTML = `<div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2"><span class="text-lg">${h.icon}</span><span class="text-sm font-medium text-gray-200">${h.key}</span></div>
        <span class="text-xs font-bold" style="color:${h.color}">${num} / ${h.target} ${h.unit}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${h.color}"></div></div>`;
    }
    el.appendChild(div);
  });
}

function renderWaterChart(results) {
  const byDate = {};
  (results||[]).forEach(p => {
    const d = prop(p.properties,"Date");
    if (d) byDate[d] = prop(p.properties,"Water") ?? 0;
  });
  const labels=[], vals=[];
  for (let i=6;i>=0;i--) {
    const d=new Date(); d.setDate(d.getDate()-i);
    labels.push(d.toLocaleDateString("en-IN",{weekday:"short",timeZone:"Asia/Kolkata"}));
    vals.push(byDate[d.toISOString().split("T")[0]] ?? 0);
  }
  new Chart(document.getElementById("waterChart").getContext("2d"),{
    type:"line",
    data:{labels,datasets:[{label:"Water (L)",data:vals,borderColor:"#3b82f6",backgroundColor:"rgba(59,130,246,.1)",borderWidth:2,pointBackgroundColor:"#3b82f6",pointRadius:4,tension:.4,fill:true}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{
      x:{ticks:{color:"#6b7280",font:{size:10}},grid:{color:"rgba(255,255,255,.04)"}},
      y:{min:0,max:5,ticks:{color:"#6b7280",font:{size:10},stepSize:1},grid:{color:"rgba(255,255,255,.04)"}}
    }}
  });
}

function renderGoals(pages) {
  const el = document.getElementById("goals-list");
  el.innerHTML = "";
  if (!pages?.length) { el.innerHTML=`<div class="glass rounded-xl p-4 text-gray-500 text-sm text-center">No goals found</div>`; return; }
  pages.forEach(page => {
    const p=page.properties;
    const name=prop(p,"Name")||prop(p,"Title")||"Untitled";
    const status=prop(p,"Status")||"Not started";
    const priority=prop(p,"Priority");
    const notes=prop(p,"Notes")||prop(p,"Description")||"";
    const sc=STATUS[status]||STATUS["Not started"];
    const div=document.createElement("div");
    div.className="glass rounded-xl p-4 card-hover";
    div.style.borderColor=sc.border;
    div.innerHTML=`<div class="flex items-start justify-between gap-3 mb-1">
      <p class="font-semibold text-white text-sm">${name}</p>
      <span class="px-2.5 py-0.5 rounded-full text-xs font-bold shrink-0" style="background:${sc.bg};color:${sc.text}">${sc.label}</span>
    </div>
    ${notes?`<p class="text-gray-500 text-xs mt-1">${notes}</p>`:""}
    ${priority?`<p class="text-xs font-bold mt-2" style="color:${PRIORITY[priority]||"#6b7280"}">↑ ${priority}</p>`:""}`;
    el.appendChild(div);
  });
}

function renderDonut(pages) {
  const counts={};
  (pages||[]).forEach(p=>{
    const s=prop(p.properties,"Status")||"Not started";
    counts[s]=(counts[s]||0)+1;
  });
  const entries=Object.entries(counts).filter(([,v])=>v>0);
  if (!entries.length) return;
  new Chart(document.getElementById("goalsDonut").getContext("2d"),{
    type:"doughnut",
    data:{
      labels:entries.map(([k])=>(STATUS[k]||STATUS["Not started"]).label),
      datasets:[{data:entries.map(([,v])=>v),
        backgroundColor:entries.map(([k])=>(STATUS[k]||STATUS["Not started"]).bg),
        borderColor:entries.map(([k])=>(STATUS[k]||STATUS["Not started"]).border),
        borderWidth:1.5}]
    },
    options:{responsive:false,cutout:"68%",plugins:{legend:{display:false}}}
  });
  document.getElementById("donut-legend").innerHTML=entries.map(([k,v])=>{
    const sc=STATUS[k]||STATUS["Not started"];
    return `<div class="flex items-center gap-2"><div class="w-2.5 h-2.5 rounded-full" style="background:${sc.text}"></div><span class="text-gray-400 text-xs">${sc.label} <span class="font-bold text-white">${v}</span></span></div>`;
  }).join("");
}

async function load() {
  try {
    const r = await fetch("data.json?t="+Date.now());
    if (!r.ok) throw new Error("data.json not found");
    const d = await r.json();
    renderHabits(d.habits?.results?.[0]);
    renderWaterChart(d.habits_week?.results);
    renderGoals(d.goals?.results);
    renderDonut(d.goals?.results);
    document.getElementById("sync-time").textContent =
      "Last synced: " + new Date(d.synced_at).toLocaleString("en-IN",{timeZone:"Asia/Kolkata"});
  } catch(e) {
    document.getElementById("habits-bars").innerHTML=
      `<div class="glass rounded-xl p-4 text-red-400 text-sm text-center">${e.message}</div>`;
  }
}
load();
</script>
</body>
</html>
